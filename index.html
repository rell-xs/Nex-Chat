<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1117">
<title>NexChat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0D1117;--panel:#161B22;--card:#1C2128;--input:#21262D;
  --border:#30363D;--text:#E6EDF3;--muted:#7D8590;--dim:#484F58;
  --green:#2EA043;--green-bright:#3FB950;--green-glow:rgba(46,160,67,.3);
  --blue:#58A6FF;--red:#F85149;--yellow:#D29922;--purple:#BC8CFF;
  --accent:#3FB950;--accent2:#58A6FF;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Outfit',sans-serif;color:var(--text);font-size:16px;}

/* ===== SCREENS ===== */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.screen.off{display:none;}

/* ===== LOADING ===== */
#splash{background:var(--bg);align-items:center;justify-content:center;gap:20px;}
.splash-logo{
  width:90px;height:90px;border-radius:28px;
  background:linear-gradient(145deg,#1a6b2a,#2EA043);
  display:flex;align-items:center;justify-content:center;font-size:42px;
  box-shadow:0 0 60px var(--green-glow),0 20px 40px rgba(0,0,0,.5);
  animation:logoIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes logoIn{from{opacity:0;transform:scale(.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.splash-name{font-size:32px;font-weight:800;letter-spacing:-1px;animation:fadeUp .5s .3s ease both;}
.splash-name span{color:var(--accent);}
.splash-spin{
  width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite,fadeUp .4s .6s ease both;
  opacity:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== LOGIN ===== */
#login{
  background:var(--bg);align-items:stretch;justify-content:flex-end;
  overflow-y:auto;
}
.login-hero{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px 24px;position:relative;overflow:hidden;
  min-height:280px;
}
.hero-glow{
  position:absolute;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(46,160,67,.18) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
}
.hero-glow2{
  position:absolute;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(88,166,255,.1) 0%,transparent 70%);
  top:30%;right:10%;pointer-events:none;
}
.login-logo{
  width:86px;height:86px;border-radius:26px;
  background:linear-gradient(145deg,#173b20,#2EA043);
  display:flex;align-items:center;justify-content:center;font-size:40px;
  box-shadow:0 0 50px var(--green-glow),0 12px 32px rgba(0,0,0,.4);
  margin-bottom:22px;animation:logoIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
.login-title{font-size:34px;font-weight:900;letter-spacing:-1.5px;text-align:center;line-height:1.1;margin-bottom:10px;}
.login-title em{color:var(--accent);font-style:normal;}
.login-desc{font-size:14px;color:var(--muted);text-align:center;line-height:1.6;max-width:260px;}

.login-sheet{
  background:var(--panel);border-radius:28px 28px 0 0;
  padding:28px 24px 40px;
  border-top:1px solid var(--border);
  animation:sheetUp .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.setup-steps{display:none;}
.setup-steps.active{display:block;}

.step-indicator{
  display:flex;align-items:center;gap:8px;margin-bottom:24px;
}
.step-dot{
  width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s;
}
.step-dot.done{background:var(--accent);box-shadow:0 0 8px var(--green-glow);}
.step-dot.active{width:24px;border-radius:4px;background:var(--accent);}

.sheet-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.sheet-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}

/* Google btn */
.btn-google{
  width:100%;padding:16px;border-radius:14px;
  background:#fff;color:#1a1a1a;border:none;
  font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:12px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  margin-bottom:16px;
}
.btn-google:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,0,0,.4);}
.btn-google:active{transform:scale(.98);}
.btn-google:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.g-icon{width:22px;height:22px;flex-shrink:0;}

/* Setup form */
.field{margin-bottom:16px;}
.field-label{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:block;
}
.field-input{
  width:100%;background:var(--input);border:1.5px solid var(--border);
  border-radius:12px;padding:14px 16px;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:15px;outline:none;
  transition:all .2s;
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,160,67,.12);}
.field-input::placeholder{color:var(--dim);}
.field-err{font-size:12px;color:var(--red);margin-top:6px;display:none;}
.field-err.show{display:block;}
.field-ok{font-size:12px;color:var(--green-bright);margin-top:6px;display:none;}
.field-ok.show{display:block;}

/* Photo picker */
.photo-pick-wrap{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.photo-preview{
  width:72px;height:72px;border-radius:50%;
  background:var(--input);border:2px dashed var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0;overflow:hidden;cursor:pointer;
  transition:border-color .2s;position:relative;
}
.photo-preview:hover{border-color:var(--accent);}
.photo-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.photo-preview .overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  opacity:0;transition:opacity .2s;border-radius:50%;
}
.photo-preview:hover .overlay{opacity:1;}
.photo-info{flex:1;}
.photo-info p{font-size:14px;font-weight:500;margin-bottom:4px;}
.photo-info span{font-size:12px;color:var(--muted);}
.btn-photo{
  background:var(--input);border:1px solid var(--border);
  color:var(--text);padding:8px 16px;border-radius:10px;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;margin-top:8px;display:inline-block;
}
.btn-photo:hover{border-color:var(--accent);color:var(--accent);}

.btn-main{
  width:100%;padding:16px;border-radius:14px;
  background:linear-gradient(135deg,#1a6b2a,var(--accent));
  color:#fff;border:none;font-family:'Outfit',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 20px var(--green-glow);
  margin-top:4px;
}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 30px var(--green-glow);}
.btn-main:active{transform:scale(.98);}
.btn-main:disabled{background:var(--card);color:var(--dim);box-shadow:none;cursor:not-allowed;transform:none;}

.btn-back{
  background:none;border:none;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:6px;
  margin-bottom:16px;
}
.btn-back:hover{color:var(--text);}

.divider-text{
  display:flex;align-items:center;gap:12px;margin:20px 0;
  color:var(--muted);font-size:13px;
}
.divider-text::before,.divider-text::after{content:'';flex:1;height:1px;background:var(--border);}

.btn-admin{
  width:100%;padding:14px;border-radius:14px;
  background:rgba(248,81,73,.08);color:var(--red);
  border:1px solid rgba(248,81,73,.25);
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-admin:hover{background:rgba(248,81,73,.15);border-color:var(--red);}

/* ===== HOME (chat list) ===== */
#home{background:var(--bg);}

.topbar{
  background:var(--panel);
  padding:env(safe-area-inset-top) 0 0;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.topbar-inner{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
}
.my-ava{
  width:38px;height:38px;border-radius:50%;object-fit:cover;
  border:2px solid var(--accent);flex-shrink:0;cursor:pointer;
  background:var(--card);
}
.topbar-info{flex:1;min-width:0;}
.topbar-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-tag{font-size:11px;color:var(--accent);font-weight:600;}
.tb-btn{
  width:36px;height:36px;background:none;border:none;
  color:var(--muted);border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.tb-btn:hover{background:var(--input);color:var(--text);}

.tab-bar{display:flex;padding:0 16px;}
.tab{
  flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;
  color:var(--muted);border-bottom:2px solid transparent;
  cursor:pointer;transition:all .2s;
}
.tab.active{color:var(--accent);border-color:var(--accent);}

.search-row{padding:10px 16px;background:var(--panel);}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--input);border-radius:12px;padding:10px 14px;
}
.search-box input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
}
.search-box input::placeholder{color:var(--dim);}

.chat-list{flex:1;overflow-y:auto;}
.chat-list::-webkit-scrollbar{width:0;}

.chat-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;cursor:pointer;
  transition:background .15s;position:relative;
}
.chat-item:active{background:var(--card);}
.chat-item::after{
  content:'';position:absolute;bottom:0;left:70px;right:0;
  height:1px;background:var(--border);opacity:.5;
}
.ci-ava{
  width:52px;height:52px;border-radius:50%;object-fit:cover;
  flex-shrink:0;background:var(--card);position:relative;
}
.ci-ava-ph{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;position:relative;
}
.ci-online{
  width:12px;height:12px;background:var(--accent);border-radius:50%;
  border:2px solid var(--panel);position:absolute;bottom:1px;right:1px;
}
.ci-group-icon{
  width:12px;height:12px;background:var(--blue);border-radius:50%;
  border:2px solid var(--panel);position:absolute;bottom:1px;right:1px;
  display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;
}
.ci-info{flex:1;min-width:0;}
.ci-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.ci-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.ci-time{font-size:11px;color:var(--muted);flex-shrink:0;margin-left:8px;}
.ci-bot{display:flex;justify-content:space-between;align-items:center;}
.ci-prev{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.ci-unread{
  background:var(--accent);color:#fff;border-radius:50%;
  min-width:20px;height:20px;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;margin-left:6px;flex-shrink:0;
}

/* FAB */
.fab{
  position:fixed;bottom:24px;right:20px;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#1a6b2a,var(--accent));
  border:none;color:#fff;font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px var(--green-glow),0 8px 24px rgba(0,0,0,.3);
  transition:all .2s;z-index:10;
}
.fab:active{transform:scale(.93);}

/* Empty */
.empty-list{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px;text-align:center;gap:12px;
}
.empty-list .ico{font-size:52px;opacity:.25;}
.empty-list .etitle{font-size:16px;font-weight:600;opacity:.5;}
.empty-list .edesc{font-size:13px;color:var(--muted);}

/* ===== MODAL: NEW CHAT / NEW GROUP ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;
  display:none;flex-direction:column;justify-content:flex-end;
  backdrop-filter:blur(6px);
}
.modal.open{display:flex;}
.modal-sheet{
  background:var(--panel);border-radius:24px 24px 0 0;
  padding:20px;max-height:85vh;display:flex;flex-direction:column;
  border-top:1px solid var(--border);
  animation:sheetUp .3s cubic-bezier(.22,1,.36,1) both;
}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.modal-list{flex:1;overflow-y:auto;}
.modal-list::-webkit-scrollbar{width:0;}
.modal-user{
  display:flex;align-items:center;gap:12px;padding:12px 4px;cursor:pointer;
  border-bottom:1px solid rgba(48,54,61,.5);transition:opacity .15s;
}
.modal-user:active{opacity:.7;}
.modal-ava{
  width:44px;height:44px;border-radius:50%;object-fit:cover;
  flex-shrink:0;background:var(--card);
}
.modal-ava-ph{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  font-weight:700;
}
.modal-uname{font-size:15px;font-weight:600;}
.modal-utag{font-size:12px;color:var(--muted);}
.chk{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.chk.checked{background:var(--accent);border-color:var(--accent);color:#fff;font-size:12px;}
.group-name-field{margin:16px 0;}
.close-modal{
  background:none;border:none;color:var(--muted);font-size:22px;
  cursor:pointer;position:absolute;right:20px;top:24px;
  display:flex;align-items:center;justify-content:center;
}

/* ===== CHAT SCREEN ===== */
#chatView{background:var(--bg);}

.chat-header{
  background:var(--panel);
  padding:env(safe-area-inset-top) 12px 12px;
  padding-top:calc(env(safe-area-inset-top) + 12px);
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.back-btn{
  width:36px;height:36px;background:none;border:none;
  color:var(--muted);border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.back-btn:active{background:var(--input);}
.ch-ava{
  width:40px;height:40px;border-radius:50%;object-fit:cover;
  flex-shrink:0;background:var(--card);
}
.ch-ava-ph{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;
}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.ch-sub{font-size:12px;color:var(--accent);}
.ch-sub.off{color:var(--muted);}

.msgs-area{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:3px;
  background:var(--bg);
}
.msgs-area::-webkit-scrollbar{width:0;}

.date-pill{align-self:center;margin:10px 0;}
.date-pill span{
  background:rgba(22,27,34,.95);color:var(--muted);
  font-size:11px;padding:5px 14px;border-radius:20px;
  border:1px solid var(--border);
}

.msg-row{display:flex;flex-direction:column;max-width:80%;animation:msgIn .18s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.out{align-self:flex-end;align-items:flex-end;}
.msg-row.in{align-self:flex-start;align-items:flex-start;}

.msg-sender-name{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:3px;padding-left:2px;}

.bubble{
  padding:9px 13px 8px;word-break:break-word;
  font-size:15px;line-height:1.5;position:relative;
}
.msg-row.out .bubble{
  background:linear-gradient(145deg,#0f3a1e,#1a5c2e);
  border-radius:18px 4px 18px 18px;
  border:1px solid rgba(46,160,67,.2);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.msg-row.in .bubble{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px 18px 18px 18px;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.big-emoji{
  background:none!important;border:none!important;
  box-shadow:none!important;font-size:42px;padding:4px!important;line-height:1.2;
}
.msg-meta{font-size:10.5px;color:var(--muted);margin-top:3px;padding:0 3px;display:flex;align-items:center;gap:4px;}
.tick{color:var(--accent);font-size:12px;}

.typing-row{
  align-self:flex-start;display:none;
  background:var(--card);border:1px solid var(--border);
  border-radius:4px 18px 18px 18px;
  padding:12px 16px;margin-top:4px;
}
.typing-row.show{display:flex;}
.dots{display:flex;gap:4px;align-items:center;}
.dots span{
  width:6px;height:6px;background:var(--muted);border-radius:50%;
  animation:dot 1.2s ease infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* Input */
.input-area{
  background:var(--panel);border-top:1px solid var(--border);
  padding:8px 12px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
  flex-shrink:0;
}
.emoji-shelf{display:none;padding:8px 0 4px;overflow-x:auto;}
.emoji-shelf.open{display:block;}
.emoji-shelf::-webkit-scrollbar{display:none;}
.emoji-scroll{display:flex;gap:4px;}
.emo-btn{
  width:40px;height:40px;background:none;border:none;
  font-size:22px;border-radius:10px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:background .1s;
}
.emo-btn:active{background:var(--input);}

.inp-row{display:flex;align-items:flex-end;gap:8px;}
.inp-box{
  flex:1;background:var(--input);border-radius:22px;
  display:flex;align-items:flex-end;padding:9px 14px;gap:8px;
  border:1.5px solid transparent;transition:border-color .2s;
}
.inp-box:focus-within{border-color:rgba(46,160,67,.35);}
.emo-tog{background:none;border:none;font-size:22px;cursor:pointer;flex-shrink:0;padding:1px;line-height:1;}
#msgTxt{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;
  resize:none;max-height:120px;line-height:1.45;
}
#msgTxt::placeholder{color:var(--dim);}
.send-btn{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(145deg,#1a6b2a,var(--accent));
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 14px var(--green-glow);transition:all .2s;
}
.send-btn:active{transform:scale(.92);}

/* ===== PROFILE SCREEN ===== */
#profileView{background:var(--bg);}
.profile-header{
  background:var(--panel);padding:env(safe-area-inset-top) 16px 16px;
  padding-top:calc(env(safe-area-inset-top)+12px);
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.profile-title{font-size:18px;font-weight:700;flex:1;}
.profile-body{flex:1;overflow-y:auto;padding:24px 20px;}
.profile-body::-webkit-scrollbar{width:0;}
